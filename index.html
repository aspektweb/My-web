<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Speaking Tutor</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        #chat-container { width: 80%; max-width: 600px; height: 400px; border: 1px solid #333; overflow-y: auto; padding: 20px; margin-top: 20px; background: #1e1e1e; border-radius: 10px; }
        .user-msg { color: #00ffcc; text-align: right; margin-bottom: 10px; }
        .ai-msg { color: #ffcc00; text-align: left; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; transition: 0.3s; }
        #mic-btn { background: #ff4b2b; color: white; }
        #mic-btn.active { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
        #status { margin-top: 10px; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <h1>AI Language Mentor</h1>
    
    <div id="chat-container">
        <div class="ai-msg">Salom! Men bilan ingliz tilida gaplashishingiz mumkin. Mikrofonni bosing va gapiring.</div>
    </div>

    <div id="status">Tayyor...</div>

    <div class="controls">
        <button id="mic-btn">🎤 Gapirishni boshlash</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
